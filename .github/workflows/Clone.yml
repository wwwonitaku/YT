name: Clone YT Channel

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'Link kênh YouTube'
        required: true
        type: string
      privacy:
        description: 'Quyền riêng tư'
        required: true
        default: 'private'
        type: choice
        options:
          - private
          - unlisted
          - public
      max_videos:
        description: 'Số video tối đa (0 = tất cả)'
        required: false
        default: '0'
        type: string
      skip_existing:
        description: 'Bỏ qua video đã upload (dùng cache)?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  clone-channel:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ────────────────────────────────────────────────────────────
      # 1. CÀI TOOLS (giống hệt code gốc)
      # ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Write cookies file
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      # ────────────────────────────────────────────────────────────
      # 2. LOAD CACHE DANH SÁCH ĐÃ UPLOAD
      # ────────────────────────────────────────────────────────────
      - name: Load cache uploaded list
        if: ${{ github.event.inputs.skip_existing == 'true' }}
        uses: actions/cache@v4
        with:
          path: uploaded_ids.txt
          key: uploaded-ids-${{ github.run_id }}
          restore-keys: |
            uploaded-ids-

      - name: Khởi tạo file uploaded_ids nếu chưa có
        run: touch uploaded_ids.txt

      # ────────────────────────────────────────────────────────────
      # 3. LẤY DANH SÁCH VIDEO CỦA KÊNH
      # ────────────────────────────────────────────────────────────
      - name: Lấy danh sách toàn bộ video ID của kênh
        run: |
          echo "📋 Đang lấy danh sách video từ: ${{ github.event.inputs.channel_url }}"

          MAX=${{ github.event.inputs.max_videos }}

          if [ "$MAX" = "0" ]; then
            yt-dlp \
              --cookies cookies.txt \
              --flat-playlist \
              --print id \
              --no-warnings \
              "${{ github.event.inputs.channel_url }}/videos" \
              > all_video_ids.txt
          else
            yt-dlp \
              --cookies cookies.txt \
              --flat-playlist \
              --print id \
              --no-warnings \
              --playlist-end "$MAX" \
              "${{ github.event.inputs.channel_url }}/videos" \
              > all_video_ids.txt
          fi

          TOTAL=$(wc -l < all_video_ids.txt)
          echo "✅ Tổng số video tìm thấy: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ Không tìm thấy video nào. Kiểm tra lại link kênh."
            exit 1
          fi

      # ────────────────────────────────────────────────────────────
      # 4. LỌC VIDEO CHƯA UPLOAD
      # ────────────────────────────────────────────────────────────
      - name: Lọc video chưa upload
        run: |
          python3 - <<'EOF'
          with open('all_video_ids.txt', 'r') as f:
              all_ids = [line.strip() for line in f if line.strip()]

          try:
              with open('uploaded_ids.txt', 'r') as f:
                  uploaded = set(line.strip() for line in f if line.strip())
          except FileNotFoundError:
              uploaded = set()

          pending = [vid for vid in all_ids if vid not in uploaded]

          with open('pending_ids.txt', 'w') as f:
              f.write('\n'.join(pending))

          print(f"📊 Tổng video:  {len(all_ids)}")
          print(f"✅ Đã upload:   {len(uploaded)}")
          print(f"⏳ Cần upload:  {len(pending)}")
          EOF

      # ────────────────────────────────────────────────────────────
      # 5. VÒNG LẶP: TẢI → KIỂM TRA → UPLOAD → XÓA → LẶP LẠI
      # ────────────────────────────────────────────────────────────
      - name: Tải và upload lần lượt từng video
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          VIDEO_PRIVACY: ${{ github.event.inputs.privacy }}
        run: |
          python3 - <<'PYEOF'
          import os, json, glob, time, subprocess, sys
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # ── Đọc danh sách video cần xử lý ──────────────────────────
          with open('pending_ids.txt', 'r') as f:
              pending = [line.strip() for line in f if line.strip()]

          total = len(pending)
          if total == 0:
              print("🎉 Không có video nào cần upload!")
              sys.exit(0)

          print(f"🚀 Bắt đầu xử lý {total} video...\n")

          # ── Khởi tạo YouTube API ────────────────────────────────────
          creds = Credentials(
              token=None,
              refresh_token=os.environ['YOUTUBE_REFRESH_TOKEN'],
              client_id=os.environ['YOUTUBE_CLIENT_ID'],
              client_secret=os.environ['YOUTUBE_CLIENT_SECRET'],
              token_uri='https://oauth2.googleapis.com/token'
          )
          youtube = build('youtube', 'v3', credentials=creds)
          privacy = os.environ.get('VIDEO_PRIVACY', 'private')

          def cleanup_video():
              for pattern in ['video.*', '*.info.json', '*.webp', '*.jpg', '*.png']:
                  for f in glob.glob(pattern):
                      try:
                          os.remove(f)
                      except:
                          pass

          success_count = 0
          fail_count = 0

          for idx, video_id in enumerate(pending, 1):
              print(f"\n{'='*60}")
              print(f"📹 [{idx}/{total}] Video ID: {video_id}")
              print(f"{'='*60}")

              cleanup_video()

              # ────────────────────────────────────────────────────────
              # BƯỚC 1: Download video từ YouTube (giữ nguyên code gốc)
              # ────────────────────────────────────────────────────────
              print("⬇️  Đang tải video...")
              dl_result = subprocess.run([
                  'yt-dlp',
                  '--cookies', 'cookies.txt',
                  '--js-runtimes', 'deno',
                  '--remote-components', 'ejs:github',
                  '--format', 'bestvideo+bestaudio/best',
                  '--merge-output-format', 'mkv',
                  '--postprocessor-args', 'ffmpeg:-c:v copy -c:a copy',
                  '--write-info-json',
                  '--output', 'video.%(ext)s',
                  f'https://www.youtube.com/watch?v={video_id}'
              ])

              if dl_result.returncode != 0:
                  print(f"  ❌ Tải thất bại! Bỏ qua.")
                  fail_count += 1
                  with open('failed_ids.txt', 'a') as f:
                      f.write(video_id + '\n')
                  cleanup_video()
                  continue

              # ────────────────────────────────────────────────────────
              # BƯỚC 2: Kiểm tra video và audio (giữ nguyên code gốc)
              # ────────────────────────────────────────────────────────
              video_file = None
              for name in ['video.mkv', 'video.mp4', 'video.webm']:
                  if os.path.exists(name):
                      video_file = name
                      break

              if not video_file:
                  print("  ❌ Không tìm thấy file video sau khi tải!")
                  fail_count += 1
                  with open('failed_ids.txt', 'a') as f:
                      f.write(video_id + '\n')
                  continue

              print(f"  📁 File tải về: {video_file}")

              audio_check = subprocess.run([
                  'ffprobe', '-v', 'error',
                  '-select_streams', 'a:0',
                  '-show_entries', 'stream=codec_name',
                  '-of', 'default=nw=1',
                  video_file
              ], capture_output=True, text=True)

              video_codec_check = subprocess.run([
                  'ffprobe', '-v', 'error',
                  '-select_streams', 'v:0',
                  '-show_entries', 'stream=codec_name',
                  '-of', 'default=nw=1',
                  video_file
              ], capture_output=True, text=True)

              size_str = f"{os.path.getsize(video_file) / 1024 / 1024:.1f} MB"
              print(f"  🎬 Codec video: {video_codec_check.stdout.strip()}")
              print(f"  🔊 Codec audio: {audio_check.stdout.strip()}")
              print(f"  💾 Dung lượng:  {size_str}")

              if not audio_check.stdout.strip():
                  print("  ❌ KHÔNG có audio stream! Dừng lại.")
                  fail_count += 1
                  with open('failed_ids.txt', 'a') as f:
                      f.write(video_id + '\n')
                  cleanup_video()
                  continue

              print("  ✅ OK — video và audio đều có")

              # ────────────────────────────────────────────────────────
              # BƯỚC 3: Upload lên YouTube channel (giữ nguyên code gốc)
              # ────────────────────────────────────────────────────────
              # Lấy tiêu đề từ info.json
              title = 'Untitled Video'
              info_files = glob.glob('*.info.json')
              if info_files:
                  try:
                      with open(info_files[0], 'r', encoding='utf-8') as f:
                          title = json.load(f).get('title', 'Untitled Video')
                  except:
                      pass
              title = (title or 'Untitled Video')[:100]

              mime_map = {
                  '.mkv': 'video/x-matroska',
                  '.mp4': 'video/mp4',
                  '.webm': 'video/webm',
              }
              ext = os.path.splitext(video_file)[1].lower()
              mime = mime_map.get(ext, 'video/mp4')

              print(f"  📤 Đang upload: {title}")
              print(f"  🔒 Privacy: {privacy}")
              print(f"  📦 MIME type: {mime}")

              body = {
                  'snippet': {
                      'title': title,
                      'description': '',
                      'categoryId': '22'
                  },
                  'status': {
                      'privacyStatus': privacy,
                      'selfDeclaredMadeForKids': False
                  }
              }
              media = MediaFileUpload(
                  video_file,
                  mimetype=mime,
                  resumable=True,
                  chunksize=10 * 1024 * 1024
              )
              request = youtube.videos().insert(
                  part='snippet,status',
                  body=body,
                  media_body=media
              )

              # Upload với retry tự động (giữ nguyên code gốc)
              response = None
              retry = 0
              try:
                  while response is None:
                      try:
                          status, response = request.next_chunk()
                          if status:
                              print(f"  ⬆️  Tiến độ: {int(status.progress() * 100)}%")
                          retry = 0
                      except Exception as e:
                          retry += 1
                          if retry > 5:
                              raise
                          print(f"  ⚠️ Lỗi tạm thời (lần {retry}): {e} — thử lại sau 10s...")
                          time.sleep(10)

                  new_video_id = response['id']
                  print(f"\n  ✅ Upload thành công! Video ID: {new_video_id}")
                  print(f"  🔗 https://www.youtube.com/watch?v={new_video_id}")
                  success_count += 1

                  # Lưu vào danh sách đã upload
                  with open('uploaded_ids.txt', 'a') as f:
                      f.write(video_id + '\n')

              except Exception as e:
                  print(f"  ❌ Upload thất bại: {e}")
                  fail_count += 1
                  with open('failed_ids.txt', 'a') as f:
                      f.write(video_id + '\n')

              # ────────────────────────────────────────────────────────
              # BƯỚC 4: Dọn dẹp file tạm, sang video tiếp theo
              # ────────────────────────────────────────────────────────
              cleanup_video()

              if idx < total:
                  print(f"  💤 Nghỉ 5 giây trước video tiếp theo...")
                  time.sleep(5)

          # ── Tổng kết ────────────────────────────────────────────────
          print(f"\n{'='*60}")
          print(f"🏁 HOÀN THÀNH!")
          print(f"  ✅ Thành công: {success_count}/{total}")
          print(f"  ❌ Thất bại:   {fail_count}/{total}")
          print(f"{'='*60}")
          PYEOF

      # ────────────────────────────────────────────────────────────
      # 6. LƯU CACHE DANH SÁCH ĐÃ UPLOAD
      # ────────────────────────────────────────────────────────────
      - name: Lưu cache uploaded list
        if: always()
        uses: actions/cache/save@v4
        with:
          path: uploaded_ids.txt
          key: uploaded-ids-${{ github.run_id }}

      # ────────────────────────────────────────────────────────────
      # 7. THỐNG KÊ CUỐI
      # ────────────────────────────────────────────────────────────
      - name: Thống kê kết quả
        if: always()
        run: |
          echo "📊 === KẾT QUẢ CUỐI CÙNG ==="
          echo "🔢 Tổng video trên kênh : $(wc -l < all_video_ids.txt 2>/dev/null || echo 0)"
          echo "✅ Đã upload thành công : $(wc -l < uploaded_ids.txt 2>/dev/null || echo 0)"
          echo "❌ Thất bại             : $(wc -l < failed_ids.txt 2>/dev/null || echo 0)"

          if [ -f failed_ids.txt ] && [ -s failed_ids.txt ]; then
            echo ""
            echo "⚠️  Danh sách video bị lỗi:"
            while read id; do
              echo "  - https://www.youtube.com/watch?v=$id"
            done < failed_ids.txt
          fi
