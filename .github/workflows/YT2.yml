name: YT2

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'ID'
        required: true
        type: string
      video_title:
        description: 'Title'
        required: false
        type: string
      tmdb:
        description: 'TMDB'
        required: true
        type: string
      privacy:
        description: 'Quyền riêng tư'
        required: true
        default: 'private'
        type: choice
        options:
          - private
          - unlisted
          - public

jobs:
  reupload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Write cookies file
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Download video từ YouTube (chất lượng cao nhất)
        run: |
          yt-dlp \
            --cookies cookies.txt \
            --js-runtimes deno \
            --remote-components ejs:github \
            --format "bestvideo+bestaudio/best" \
            --merge-output-format mkv \
            --postprocessor-args "ffmpeg:-c:v copy -c:a copy" \
            --write-info-json \
            --output "video.%(ext)s" \
            "https://www.youtube.com/watch?v=${{ github.event.inputs.youtube_url }}"

      - name: Kiểm tra video và audio
        run: |
          VIDEO=$(ls video.mkv video.mp4 video.webm 2>/dev/null | head -1)
          echo "📁 File tải về: $VIDEO"
          echo "📊 Thông tin đầy đủ:"
          ffprobe -v error -show_streams -of default=nw=1 "$VIDEO" || true

          AUDIO=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=nw=1 "$VIDEO" 2>&1)
          VIDEO_CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=nw=1 "$VIDEO" 2>&1)
          SIZE=$(du -sh "$VIDEO" | cut -f1)

          echo "🎬 Codec video: $VIDEO_CODEC"
          echo "🔊 Codec audio: $AUDIO"
          echo "💾 Dung lượng: $SIZE"

          if [ -z "$AUDIO" ]; then
            echo "❌ KHÔNG có audio stream! Dừng lại."
            exit 1
          else
            echo "✅ OK — video và audio đều có"
          fi

          echo "VIDEO_FILE=$VIDEO" >> $GITHUB_ENV

      - name: Upload lên YouTube channel
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          VIDEO_TITLE: ${{ github.event.inputs.video_title }}
          VIDEO_PRIVACY: ${{ github.event.inputs.privacy }}
        run: |
          python3 - <<'EOF'
          import os, json, glob, time, mimetypes
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # Tìm file video (ưu tiên mkv > mp4 > webm)
          video_file = None
          for ext in ['*.mkv', '*.mp4', '*.webm']:
              files = glob.glob(ext)
              if files:
                  video_file = files[0]
                  break
          if not video_file:
              raise FileNotFoundError("Không tìm thấy file video!")
          print(f"📁 File video: {video_file}")
          print(f"💾 Dung lượng: {os.path.getsize(video_file) / 1024 / 1024:.1f} MB")

          # Khởi tạo credentials
          creds = Credentials(
              token=None,
              refresh_token=os.environ['YOUTUBE_REFRESH_TOKEN'],
              client_id=os.environ['YOUTUBE_CLIENT_ID'],
              client_secret=os.environ['YOUTUBE_CLIENT_SECRET'],
              token_uri='https://oauth2.googleapis.com/token'
          )
          youtube = build('youtube', 'v3', credentials=creds)

          # Lấy tiêu đề
          title = os.environ.get('VIDEO_TITLE', '').strip()
          if not title:
              info_files = glob.glob('*.info.json')
              if info_files:
                  with open(info_files[0], 'r', encoding='utf-8') as f:
                      title = json.load(f).get('title', 'Untitled Video')
          title = (title or 'Untitled Video')[:100]
          privacy = os.environ.get('VIDEO_PRIVACY', 'private')

          print(f"📤 Đang upload: {title}")
          print(f"🔒 Privacy: {privacy}")

          # Xác định mimetype đúng theo đuôi file
          mime_map = {
              '.mkv': 'video/x-matroska',
              '.mp4': 'video/mp4',
              '.webm': 'video/webm',
          }
          ext = os.path.splitext(video_file)[1].lower()
          mime = mime_map.get(ext, 'video/mp4')
          print(f"📦 MIME type: {mime}")

          body = {
              'snippet': {
                  'title': title,
                  'description': '',
                  'categoryId': '22'
              },
              'status': {
                  'privacyStatus': privacy,
                  'selfDeclaredMadeForKids': False
              }
          }
          media = MediaFileUpload(
              video_file,
              mimetype=mime,
              resumable=True,
              chunksize=10 * 1024 * 1024
          )
          request = youtube.videos().insert(
              part='snippet,status',
              body=body,
              media_body=media
          )

          # Upload với retry tự động
          response = None
          retry = 0
          while response is None:
              try:
                  status, response = request.next_chunk()
                  if status:
                      print(f"  ⬆️  Tiến độ: {int(status.progress() * 100)}%")
                  retry = 0
              except Exception as e:
                  retry += 1
                  if retry > 5:
                      raise
                  print(f"  ⚠️ Lỗi tạm thời (lần {retry}): {e} — thử lại sau 10s...")
                  time.sleep(10)

          video_id = response['id']
          print(f"\n✅ Upload thành công! Video ID: {video_id}")
          print(f"🔗 https://www.youtube.com/watch?v={video_id}")

          # Lưu video_id ra file để các step sau dùng
          with open('uploaded_video_id.txt', 'w') as f:
              f.write(video_id)

          # Kiểm tra trạng thái xử lý
          print("\n⏳ Đang chờ YouTube xử lý...")
          for i in range(6):
              time.sleep(30)
              status_resp = youtube.videos().list(
                  part="status,processingDetails",
                  id=video_id
              ).execute()
              if not status_resp.get("items"):
                  print(f"  [{i+1}] ⚠️ Không tìm thấy video")
                  continue
              item = status_resp["items"][0]
              upload_status     = item["status"].get("uploadStatus", "unknown")
              processing_status = item.get("processingDetails", {}).get("processingStatus", "unknown")
              print(f"  [{i+1}] uploadStatus={upload_status} | processingStatus={processing_status}")
              if upload_status == "processed":
                  print("🎉 Video đã xử lý xong và sẵn sàng!")
                  break
              elif upload_status == "failed":
                  reason = item["status"].get("failureReason", "unknown")
                  print(f"❌ Video xử lý thất bại: {reason}")
                  break
          else:
              print("⏰ Hết thời gian kiểm tra — video vẫn đang xử lý trên YouTube (bình thường với video dài)")
          EOF

      - name: Convert to HLS for Cloudflare Pages
        run: |
          mkdir -p output
          VIDEO=${{ env.VIDEO_FILE }}
          echo "🎬 Converting: $VIDEO → HLS"
          ffmpeg -i "$VIDEO" -c copy -f hls \
            -hls_time 5 \
            -hls_list_size 0 \
            -start_number 10001 \
            -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${{ github.event.inputs.tmdb }}-index.png" \
            -hls_segment_filename "output/${{ github.event.inputs.tmdb }}-index%d.png" \
            "output/${{ github.event.inputs.tmdb }}.m3u8"
          echo "✅ HLS segments:"
          ls -lh output/

      - name: Deploy to Cloudflare Pages
        id: deploy_cf
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: x0-vicdn-cc
          directory: ./output
          branch: ${{ github.event.inputs.tmdb }}

      - name: Summary
        run: |
          YT_ID=$(cat uploaded_video_id.txt 2>/dev/null || echo "unknown")
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ HOÀN TẤT!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📺 YouTube  : https://www.youtube.com/watch?v=${YT_ID}"
          echo "☁️  Cloudflare: ${{ steps.deploy_cf.outputs.url }}/${{ github.event.inputs.tmdb }}.m3u8"
          echo "🎞️  TMDB ID  : ${{ github.event.inputs.tmdb }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
